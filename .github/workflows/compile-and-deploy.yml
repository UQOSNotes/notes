# .github/workflows/compile-and-deploy.yml
name: Compile and Deploy Notes

on:
  push:
    branches: [main]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # needed to diff against previous commit

      - name: Install Typst
        uses: typst-community/setup-typst@v3
        with:
          typst-version: latest

      - name: Detect changed courses
        id: changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -Eq '^lib\.typ$'; then
            find . -name main.typ -printf '%h\n' | sed 's#^\./##' | sort -u > course_roots.txt
            : > removed_course_roots.txt

            echo "Changed course roots (lib.typ changed):"
            cat course_roots.txt || true

            echo "courses=$(tr '\n' ' ' < course_roots.txt)" >> $GITHUB_OUTPUT
            echo "removed_courses=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Track changed and removed Typst paths, including rename old/new paths.
          git diff --name-status --find-renames HEAD~1 HEAD > changed_files_status.txt

          : > changed_dirs.txt
          : > removed_candidate_dirs.txt

          while IFS=$'\t' read -r status path1 path2; do
            case "$status" in
              D)
                if echo "$path1" | grep -q '\.typ$'; then
                  echo "${path1%/*}" >> removed_candidate_dirs.txt
                fi
                ;;
              R*)
                if echo "$path1" | grep -q '\.typ$'; then
                  echo "${path1%/*}" >> removed_candidate_dirs.txt
                fi
                if echo "$path2" | grep -q '\.typ$'; then
                  echo "${path2%/*}" >> changed_dirs.txt
                fi
                ;;
              *)
                if echo "$path1" | grep -q '\.typ$'; then
                  echo "${path1%/*}" >> changed_dirs.txt
                fi
                ;;
            esac
          done < changed_files_status.txt

          sort -u changed_dirs.txt -o changed_dirs.txt
          sort -u removed_candidate_dirs.txt -o removed_candidate_dirs.txt

          # Walk up to find course roots that exist in the current commit.
          : > course_roots.txt
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            while [ "$dir" != "." ]; do
              if [ -f "$dir/main.typ" ]; then
                echo "$dir" >> course_roots.txt
                break
              fi
              dir=$(dirname "$dir")
            done
          done < changed_dirs.txt
          sort -u course_roots.txt -o course_roots.txt

          # Walk up to find course roots that existed in the previous commit.
          : > removed_course_roots.txt
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            while [ "$dir" != "." ]; do
              if git cat-file -e "HEAD~1:$dir/main.typ" 2>/dev/null; then
                echo "$dir" >> removed_course_roots.txt
                break
              fi
              dir=$(dirname "$dir")
            done
          done < removed_candidate_dirs.txt
          sort -u removed_course_roots.txt -o removed_course_roots.txt

          echo "Changed course roots:"
          cat course_roots.txt || true
          echo "Removed course roots:"
          cat removed_course_roots.txt || true

          echo "courses=$(tr '\n' ' ' < course_roots.txt)" >> $GITHUB_OUTPUT
          echo "removed_courses=$(tr '\n' ' ' < removed_course_roots.txt)" >> $GITHUB_OUTPUT

      - name: Compile changed courses
        run: |
          while IFS= read -r course; do
            echo "Compiling $course"
            typst compile --root . "$course/main.typ" "$course/notes.pdf"
          done < course_roots.txt

      - name: Push PDFs to site repo
        env:
          SITE_REPO_TOKEN: ${{ secrets.SITE_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${SITE_REPO_TOKEN}@github.com/UQOSNotes/uqosnotes.github.io.git site-repo

          while IFS= read -r course; do
            [ -z "$course" ] && continue
            rm -f "site-repo/public/notes/$course/notes.pdf"
            rmdir -p --ignore-fail-on-non-empty "site-repo/public/notes/$course" 2>/dev/null || true
          done < removed_course_roots.txt
          
          while IFS= read -r course; do
            [ -z "$course" ] && continue
            dest="site-repo/public/notes/$course"
            mkdir -p "$dest"
            cp "$course/notes.pdf" "$dest/notes.pdf"
          done < course_roots.txt
          
          cd site-repo
          git config user.name "UQOSNotes Bot"
          git config user.email "bot@uqosnotes.github.io"
          git add public/notes/
          git diff --staged --quiet || git commit -m "chore: update compiled notes"
          git push